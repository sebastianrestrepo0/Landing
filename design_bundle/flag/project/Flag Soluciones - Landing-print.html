<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Flag Soluciones · La confianza que da la experiencia en SAP</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
<style>
  /* Print-friendly overrides */
  html, body { background: #fff !important; }
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }

  /* Hide sticky header / mobile menu when printing & viewing as document */
  .header { position: static !important; box-shadow: none !important; background: #fff !important; backdrop-filter: none !important; }
  .mobile-menu { display: none !important; }
  .menu-toggle { display: none !important; }

  /* Disable animations for stable capture */
  *, *::before, *::after {
    animation: none !important;
    transition: none !important;
  }
  .reveal { opacity: 1 !important; transform: none !important; }

  /* Constrain to A4 portrait page width for nicer pagination */
  body { width: 100%; }
  .section { padding: 56px 0 !important; }
  .hero { padding: 48px 0 64px !important; }

  /* Prevent splitting visual blocks across pages */
  .why-card, .svc-card, .acc-card, .award, .tst-card, .tl-item, .float, .dash-main, .cta-final-inner, .footer-top, .step, .hero-visual {
    break-inside: avoid;
    page-break-inside: avoid;
  }

  section, .section { break-inside: avoid-page; }

  /* Force major sections onto their own page */
  #servicios, #nosotros, #certificaciones, #trayectoria, #contacto, .model, .footer {
    break-before: page;
    page-break-before: always;
  }

  /* Force overflows visible so floats/dashboards print fully */
  .hero, .hero-visual, .cta-final-inner, .footer { overflow: visible !important; }

  @page {
    size: A4 portrait;
    margin: 12mm 10mm;
  }

  @media print {
    .header { display: none !important; }
    body { background: #fff !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="app-part1.jsx"></script>
<script type="text/babel" src="app-part2.jsx"></script>
<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  return (
    <>
      <Header menuOpen={false} setMenuOpen={() => {}} />
      <main>
        <Hero />
        <Trust />
        <Why />
        <Services />
        <Model />
        <Accelerators />
        <Company />
        <Awards />
        <Testimonials />
        <CtaFinal />
      </main>
      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

(async () => {
  try {
    if (document.fonts && document.fonts.ready) await document.fonts.ready;
  } catch (e) {}
  setTimeout(() => { window.print(); }, 900);
})();
</script>
</body>
</html>
