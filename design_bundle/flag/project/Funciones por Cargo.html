<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<title>Funciones por Cargo · UX Flow</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>
  /* ===== Design tokens (Flag enterprise) ===== */
  :root {
    --c-primary:        #1E22AA;
    --c-primary-700:    #141787;
    --c-primary-900:    #0f1265;
    --c-primary-50:     #eef0fb;
    --c-primary-100:    #dde1f5;
    --c-text:           #11151c;
    --c-text-muted:     #6b7280;
    --c-text-soft:      #9aa3b2;
    --c-bg-page:        #f5f7fb;
    --c-bg-card:        #ffffff;
    --c-bg-zebra:       #f7f9fc;
    --c-bg-hover:       #eef3fb;
    --c-border:         #e5e9f0;
    --c-border-soft:    #eef1f6;
    --c-border-strong:  #d3d9e3;
    --c-success:        #1f6024;
    --c-success-bg:     #e8f3ea;
    --c-danger:         #b42525;
    --c-danger-bg:      #fbeaea;
    --c-warning:        #9a6a00;
    --c-warning-bg:     #fef4dd;
    --shadow-xs:        0 1px 2px rgba(15,20,40,0.04);
    --shadow-sm:        0 2px 6px rgba(15,20,40,0.06);
    --shadow-md:        0 8px 24px rgba(15,20,40,0.10);
    --shadow-lg:        0 24px 60px rgba(15,20,40,0.18);
    --ring:             0 0 0 3px rgba(30,34,170,0.16);
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: "Inter Tight", system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
    color: var(--c-text);
    background: var(--c-bg-page);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== Canvas chrome ===== */
  .canvas-intro {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    z-index: 100;
    background: rgba(255,255,255,0.95);
    border: 1px solid var(--c-border);
    box-shadow: var(--shadow-sm);
    border-radius: 999px;
    padding: 8px 18px;
    font-size: 12.5px; color: var(--c-text-muted);
    backdrop-filter: blur(8px);
    pointer-events: none;
  }
  .canvas-intro strong { color: var(--c-primary); font-weight: 600; }

  /* ===== App shell (común a las 2 variaciones) ===== */
  .app {
    display: grid;
    grid-template-columns: 240px 1fr;
    width: 1440px;
    height: 900px;
    background: var(--c-bg-page);
    border: 1px solid var(--c-border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }

  /* ===== Sidebar ===== */
  .side {
    background: linear-gradient(180deg, #1d3fa8 0%, #1530a0 100%);
    color: #cfd8f5;
    display: flex; flex-direction: column;
    padding: 18px 12px 14px;
  }
  .side-logo {
    background: #fff;
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 10px;
    box-shadow: var(--shadow-xs);
  }
  .side-logo-mark {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, #2c5fef 0%, #4d8bf5 100%);
    border-radius: 8px;
    display: grid; place-items: center;
    color: #fff; font-weight: 700; font-size: 13px;
  }
  .side-logo-text { font-weight: 700; color: var(--c-primary); font-size: 15px; letter-spacing: -0.01em; }
  .side-logo-text small { display: block; font-size: 9.5px; font-weight: 500; color: var(--c-text-muted); letter-spacing: 0.04em; text-transform: uppercase; }
  .side-search {
    position: relative; margin-bottom: 14px;
  }
  .side-search input {
    width: 100%;
    background: rgba(255,255,255,0.10);
    border: 1px solid rgba(255,255,255,0.16);
    border-radius: 999px;
    color: #fff;
    font-size: 12.5px;
    padding: 8px 12px 8px 32px;
    outline: none;
    font-family: inherit;
  }
  .side-search input::placeholder { color: rgba(255,255,255,0.55); }
  .side-search i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 11px; color: rgba(255,255,255,0.55); }
  .side-section {
    font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.08em;
    color: rgba(255,255,255,0.45);
    padding: 10px 8px 6px;
    font-weight: 600;
  }
  .side-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px;
    border-radius: 8px;
    font-size: 12.5px;
    color: rgba(255,255,255,0.85);
    margin-bottom: 2px;
    cursor: pointer;
    transition: background 100ms ease, color 100ms ease;
  }
  .side-item i { font-size: 12px; width: 18px; text-align: center; opacity: 0.85; }
  .side-item:hover { background: rgba(255,255,255,0.07); color: #fff; }
  .side-item.active {
    background: #fff; color: var(--c-primary); font-weight: 600;
    box-shadow: var(--shadow-xs);
  }
  .side-item.active i { color: var(--c-primary); opacity: 1; }
  .side-item-sub {
    padding: 7px 10px 7px 36px;
    font-size: 12px;
    color: rgba(255,255,255,0.78);
    border-radius: 6px;
    margin-bottom: 1px;
    cursor: pointer;
  }
  .side-item-sub:hover { background: rgba(255,255,255,0.06); color: #fff; }
  .side-item-sub.active { background: rgba(255,255,255,0.14); color: #fff; font-weight: 600; }
  .side-foot {
    margin-top: auto;
    padding: 12px 10px;
    background: rgba(0,0,0,0.18);
    border-radius: 10px;
    display: flex; align-items: center; gap: 10px;
    font-size: 12px;
  }
  .side-foot-avatar {
    width: 28px; height: 28px; border-radius: 999px;
    background: #fff; color: var(--c-primary);
    display: grid; place-items: center; font-weight: 700; font-size: 11px;
  }

  /* ===== Main panel ===== */
  .main { display: flex; flex-direction: column; min-width: 0; background: var(--c-bg-page); }

  /* ===== Page header (compacto, sin la franja morada degradada del original) ===== */
  .page-head {
    background: #fff;
    border-bottom: 1px solid var(--c-border);
    padding: 18px 28px 16px;
    display: flex; align-items: flex-start; justify-content: space-between; gap: 24px;
  }
  .page-head-left { display: flex; align-items: flex-start; gap: 14px; }
  .page-head-icon {
    width: 40px; height: 40px;
    background: var(--c-primary-50);
    border: 1px solid var(--c-primary-100);
    border-radius: 10px;
    display: grid; place-items: center;
    color: var(--c-primary);
    font-size: 16px;
    flex: none;
  }
  .page-head h1 {
    margin: 0;
    font-size: 19px;
    font-weight: 700;
    letter-spacing: -0.015em;
    color: var(--c-text);
    line-height: 1.25;
  }
  .breadcrumb {
    font-size: 11.5px;
    color: var(--c-text-muted);
    margin-bottom: 4px;
    display: flex; align-items: center; gap: 6px;
  }
  .breadcrumb i { font-size: 8px; opacity: 0.6; }
  .page-head p {
    margin: 4px 0 0;
    font-size: 12.5px;
    color: var(--c-text-muted);
    max-width: 560px;
  }
  .page-head-right { display: flex; align-items: center; gap: 8px; }

  /* ===== Buttons ===== */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 7px;
    border: 1px solid transparent;
    border-radius: 8px;
    padding: 8px 14px;
    font-family: inherit;
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
    background: transparent;
    color: var(--c-text);
    transition: background 100ms ease, color 100ms ease, border-color 100ms ease, box-shadow 100ms ease, transform 90ms ease;
    white-space: nowrap;
  }
  .btn:active { transform: translateY(1px); }
  .btn-primary {
    background: var(--c-primary);
    color: #fff;
    border-color: var(--c-primary);
    box-shadow: 0 1px 0 rgba(15,20,40,0.06);
  }
  .btn-primary:hover { background: var(--c-primary-700); border-color: var(--c-primary-700); }
  .btn-ghost {
    background: #fff; border-color: var(--c-border);
    color: var(--c-text);
  }
  .btn-ghost:hover { background: var(--c-bg-hover); border-color: var(--c-primary-100); color: var(--c-primary); }
  .btn-icon {
    width: 32px; height: 32px;
    padding: 0;
    background: transparent;
    border: 1px solid transparent;
    border-radius: 7px;
    color: var(--c-text-muted);
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background 100ms ease, color 100ms ease, border-color 100ms ease;
  }
  .btn-icon:hover { background: var(--c-bg-hover); color: var(--c-primary); border-color: var(--c-primary-100); }
  .btn-icon.danger:hover { background: var(--c-danger-bg); color: var(--c-danger); border-color: rgba(180,37,37,0.20); }
  .btn-sm { padding: 6px 10px; font-size: 12px; }

  /* ===== Toolbar ===== */
  .toolbar {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 28px;
    background: #fff;
    border-bottom: 1px solid var(--c-border);
    flex-wrap: wrap;
  }
  .search-input {
    flex: 1; min-width: 220px; max-width: 360px;
    position: relative;
  }
  .search-input i {
    position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
    color: var(--c-text-soft); font-size: 12px;
  }
  .search-input input {
    width: 100%;
    padding: 8px 12px 8px 32px;
    background: var(--c-bg-zebra);
    border: 1px solid var(--c-border);
    border-radius: 8px;
    font-size: 12.5px;
    font-family: inherit;
    outline: none;
    transition: background 100ms, border-color 100ms, box-shadow 100ms;
  }
  .search-input input:focus { background: #fff; border-color: var(--c-primary); box-shadow: var(--ring); }

  /* Segmented filter */
  .seg {
    display: inline-flex;
    background: var(--c-bg-zebra);
    border: 1px solid var(--c-border);
    border-radius: 8px;
    padding: 2px;
    gap: 0;
  }
  .seg button {
    background: transparent;
    border: 0;
    padding: 5px 12px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    color: var(--c-text-muted);
    border-radius: 6px;
    cursor: pointer;
    transition: background 100ms ease, color 100ms ease;
  }
  .seg button:hover { color: var(--c-text); }
  .seg button.on {
    background: #fff;
    color: var(--c-primary);
    font-weight: 600;
    box-shadow: var(--shadow-xs);
  }

  .toolbar .spacer { flex: 1; }
  .stats-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 11px;
    border-radius: 999px;
    background: var(--c-primary-50);
    color: var(--c-primary);
    font-size: 11.5px; font-weight: 600;
    border: 1px solid var(--c-primary-100);
  }
  .stats-pill strong { font-weight: 700; }

  /* ===== Body container ===== */
  .body {
    flex: 1;
    padding: 18px 28px 28px;
    overflow: auto;
  }

  /* ===== Variation A: master accordion ===== */
  .cargo-card {
    background: #fff;
    border: 1px solid var(--c-border);
    border-radius: 10px;
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color 120ms ease, box-shadow 120ms ease;
  }
  .cargo-card:hover { border-color: var(--c-primary-100); }
  .cargo-card.open { border-color: var(--c-primary-100); box-shadow: var(--shadow-sm); }

  .cargo-head {
    display: grid;
    grid-template-columns: 32px 1fr auto auto;
    align-items: center; gap: 14px;
    padding: 12px 16px;
    cursor: pointer;
    background: #fff;
    transition: background 100ms ease;
  }
  .cargo-head:hover { background: var(--c-bg-hover); }
  .cargo-card.open .cargo-head { background: linear-gradient(180deg, #f4f6fa 0%, #eef1f6 100%); border-bottom: 1px solid var(--c-border); }
  .cargo-icon {
    width: 32px; height: 32px;
    background: var(--c-primary-50);
    border: 1px solid var(--c-primary-100);
    color: var(--c-primary);
    border-radius: 8px;
    display: grid; place-items: center;
    font-size: 13px;
  }
  .cargo-info-name { font-weight: 600; font-size: 13.5px; color: var(--c-text); letter-spacing: -0.005em; }
  .cargo-info-meta { font-size: 11.5px; color: var(--c-text-muted); margin-top: 2px; display: flex; align-items: center; gap: 8px; }
  .dot { display: inline-block; width: 3px; height: 3px; border-radius: 50%; background: currentColor; opacity: 0.5; }

  .pill {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 2px 9px;
    border-radius: 999px;
    background: var(--c-primary-50);
    color: var(--c-primary);
    font-size: 11px; font-weight: 600;
    border: 1px solid var(--c-primary-100);
    line-height: 1.5;
  }
  .pill.success { background: var(--c-success-bg); color: var(--c-success); border-color: rgba(31,96,36,0.18); }
  .pill.warn    { background: var(--c-warning-bg); color: var(--c-warning); border-color: rgba(154,106,0,0.18); }
  .pill.muted   { background: var(--c-bg-zebra); color: var(--c-text-muted); border-color: var(--c-border); }

  .chev {
    color: var(--c-text-soft);
    transition: transform 180ms ease;
    font-size: 12px;
  }
  .cargo-card.open .chev { transform: rotate(180deg); color: var(--c-primary); }

  .cargo-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 280ms ease;
  }
  .cargo-card.open .cargo-body { max-height: 800px; }
  .cargo-body-inner { padding: 8px 16px 14px; }

  /* Function row */
  .fn {
    display: grid;
    grid-template-columns: 18px 28px 1fr 56px 32px 32px;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid transparent;
    transition: background 100ms ease, border-color 100ms ease, box-shadow 100ms ease;
  }
  .fn:hover { background: var(--c-bg-zebra); border-color: var(--c-border-soft); }
  .fn.dragging { background: #fff; box-shadow: var(--shadow-md); border-color: var(--c-primary-100); }
  .fn.inactive .fn-text { color: var(--c-text-soft); text-decoration: line-through; text-decoration-color: rgba(0,0,0,0.18); }
  .fn-drag {
    color: var(--c-text-soft);
    cursor: grab;
    font-size: 14px;
    display: grid; place-items: center;
    user-select: none;
  }
  .fn-drag:active { cursor: grabbing; }
  .fn:hover .fn-drag { color: var(--c-text-muted); }
  .fn-order {
    width: 28px; height: 22px;
    border-radius: 6px;
    background: var(--c-bg-zebra);
    color: var(--c-text-muted);
    font-variant-numeric: tabular-nums;
    font-weight: 600;
    font-size: 11.5px;
    display: grid; place-items: center;
    border: 1px solid var(--c-border-soft);
  }
  .fn-text { font-size: 12.8px; color: var(--c-text); line-height: 1.5; }

  /* Switch (Activo) */
  .switch {
    position: relative;
    width: 36px; height: 20px;
    background: #c9cfdb;
    border-radius: 999px;
    cursor: pointer;
    transition: background 140ms ease;
    flex: none;
  }
  .switch::after {
    content: "";
    position: absolute; top: 2px; left: 2px;
    width: 16px; height: 16px;
    background: #fff;
    border-radius: 50%;
    transition: left 160ms cubic-bezier(.34,1.4,.64,1);
    box-shadow: 0 1px 2px rgba(0,0,0,0.15);
  }
  .switch.on { background: var(--c-primary); }
  .switch.on::after { left: 18px; }

  /* Empty state inside cargo */
  .fn-empty {
    text-align: center;
    padding: 24px 16px 20px;
    border: 1px dashed var(--c-border-strong);
    border-radius: 10px;
    background: var(--c-bg-zebra);
    color: var(--c-text-muted);
    font-size: 12.5px;
  }
  .fn-empty i { font-size: 22px; color: var(--c-primary); margin-bottom: 8px; display: block; }
  .fn-empty .btn { margin-top: 10px; }

  /* Add inline */
  .fn-add-row {
    margin-top: 8px;
    display: flex; align-items: center; gap: 8px;
  }
  .fn-add-row input {
    flex: 1;
    padding: 8px 12px;
    border: 1px dashed var(--c-border-strong);
    border-radius: 8px;
    background: transparent;
    font-size: 12.5px;
    font-family: inherit;
    outline: none;
    color: var(--c-text);
    transition: border-color 100ms, background 100ms, box-shadow 100ms;
  }
  .fn-add-row input:focus {
    border-style: solid;
    border-color: var(--c-primary);
    background: #fff;
    box-shadow: var(--ring);
  }
  .fn-add-row input::placeholder { color: var(--c-text-soft); }

  /* Highlight new */
  @keyframes flashNew {
    0%   { background: rgba(30,34,170,0.14); border-color: var(--c-primary); }
    100% { background: transparent; border-color: transparent; }
  }
  .fn.is-new { animation: flashNew 1.6s ease-out; }

  /* ===== Modal ===== */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(15,20,40,0.45);
    backdrop-filter: blur(2px);
    display: none;
    align-items: center; justify-content: center;
    z-index: 1000;
    animation: fadeIn 160ms ease-out;
  }
  .modal-backdrop.show { display: flex; }
  @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(10px) } to { opacity: 1; transform: translateY(0) } }

  .modal {
    background: #fff;
    border-radius: 14px;
    width: 560px;
    max-width: 92vw;
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    animation: slideUp 200ms cubic-bezier(.34,1.2,.64,1);
  }
  .modal-head {
    padding: 18px 22px 14px;
    border-bottom: 1px solid var(--c-border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-head h3 {
    margin: 0; font-size: 16px; font-weight: 700;
    color: var(--c-text); letter-spacing: -0.01em;
    display: flex; align-items: center; gap: 10px;
  }
  .modal-head h3 i { color: var(--c-primary); font-size: 14px; }
  .modal-body { padding: 20px 22px; display: flex; flex-direction: column; gap: 14px; }
  .modal-foot {
    padding: 14px 22px;
    background: var(--c-bg-zebra);
    border-top: 1px solid var(--c-border);
    display: flex; justify-content: space-between; align-items: center;
  }

  .field { display: flex; flex-direction: column; gap: 5px; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .field label {
    font-size: 10.5px;
    font-weight: 600;
    color: var(--c-text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .field input,
  .field select,
  .field textarea {
    padding: 9px 12px;
    border: 1px solid var(--c-border-strong);
    border-radius: 8px;
    font-size: 13px;
    font-family: inherit;
    color: var(--c-text);
    background: #fff;
    outline: none;
    transition: border-color 100ms, box-shadow 100ms;
    width: 100%;
  }
  .field textarea { min-height: 80px; resize: vertical; line-height: 1.5; }
  .field input:focus,
  .field select:focus,
  .field textarea:focus { border-color: var(--c-primary); box-shadow: var(--ring); }
  .field-help { font-size: 11.5px; color: var(--c-text-muted); display: flex; align-items: center; gap: 6px; }
  .field-help.error { color: var(--c-danger); }
  .field-help.error i { font-size: 10px; }
  .char-count { font-variant-numeric: tabular-nums; }

  .toggle-card {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px;
    border: 1px solid var(--c-border);
    border-radius: 8px;
    background: var(--c-bg-zebra);
    cursor: pointer;
    transition: background 100ms, border-color 100ms;
  }
  .toggle-card:hover { background: var(--c-bg-hover); border-color: var(--c-primary-100); }
  .toggle-card .toggle-info { flex: 1; }
  .toggle-card .toggle-info-title { font-size: 12.5px; font-weight: 600; color: var(--c-text); }
  .toggle-card .toggle-info-sub   { font-size: 11.5px; color: var(--c-text-muted); margin-top: 1px; }

  /* ===== Toast ===== */
  .toast-container {
    position: fixed;
    bottom: 24px; right: 24px;
    display: flex; flex-direction: column-reverse; gap: 10px;
    z-index: 1100;
    pointer-events: none;
  }
  .toast {
    pointer-events: auto;
    display: flex; align-items: center; gap: 10px;
    padding: 11px 14px 11px 13px;
    background: #11151c;
    color: #fff;
    border-radius: 10px;
    font-size: 12.5px;
    box-shadow: var(--shadow-lg);
    min-width: 280px;
    animation: toastIn 240ms cubic-bezier(.34,1.4,.64,1);
  }
  @keyframes toastIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .toast.success { background: linear-gradient(180deg, #1a4d23 0%, #0d3b16 100%); }
  .toast.danger  { background: linear-gradient(180deg, #862a2a 0%, #5e1c1c 100%); }
  .toast i.lead { font-size: 14px; }
  .toast .undo-btn {
    margin-left: auto;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.20);
    color: #fff;
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 11.5px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
  }
  .toast .undo-btn:hover { background: rgba(255,255,255,0.18); }

  /* ===== Variation B: Split view ===== */
  .split {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 14px;
    height: 100%;
  }
  .col-cargos {
    background: #fff;
    border: 1px solid var(--c-border);
    border-radius: 10px;
    overflow: hidden;
    display: flex; flex-direction: column;
  }
  .col-cargos-head {
    padding: 12px 14px;
    border-bottom: 1px solid var(--c-border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .col-cargos-head h4 { margin: 0; font-size: 12px; font-weight: 700; color: var(--c-text); text-transform: uppercase; letter-spacing: 0.05em; }
  .col-cargos-search {
    padding: 10px 12px;
    border-bottom: 1px solid var(--c-border-soft);
  }
  .col-cargos-list {
    flex: 1;
    overflow: auto;
    padding: 6px 8px;
  }
  .cargo-pick {
    display: grid;
    grid-template-columns: 28px 1fr auto;
    align-items: center; gap: 10px;
    padding: 9px 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 100ms ease;
    margin-bottom: 2px;
    border: 1px solid transparent;
  }
  .cargo-pick:hover { background: var(--c-bg-hover); }
  .cargo-pick.active {
    background: var(--c-primary-50);
    border-color: var(--c-primary-100);
  }
  .cargo-pick.active .cargo-pick-name { color: var(--c-primary); font-weight: 600; }
  .cargo-pick-icon {
    width: 28px; height: 28px;
    background: var(--c-bg-zebra);
    border: 1px solid var(--c-border);
    border-radius: 7px;
    display: grid; place-items: center;
    color: var(--c-text-muted);
    font-size: 11px;
  }
  .cargo-pick.active .cargo-pick-icon { background: #fff; border-color: var(--c-primary-100); color: var(--c-primary); }
  .cargo-pick-name { font-size: 12.8px; color: var(--c-text); letter-spacing: -0.005em; }
  .cargo-pick-count {
    font-size: 11px;
    color: var(--c-text-muted);
    background: var(--c-bg-zebra);
    border: 1px solid var(--c-border);
    border-radius: 999px;
    padding: 1px 8px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .cargo-pick.active .cargo-pick-count { background: #fff; color: var(--c-primary); border-color: var(--c-primary-100); }

  .col-funcs {
    background: #fff;
    border: 1px solid var(--c-border);
    border-radius: 10px;
    overflow: hidden;
    display: flex; flex-direction: column;
  }
  .col-funcs-head {
    padding: 14px 18px 12px;
    border-bottom: 1px solid var(--c-border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .col-funcs-title { font-weight: 700; font-size: 14.5px; color: var(--c-text); letter-spacing: -0.01em; display: flex; align-items: center; gap: 10px; }
  .col-funcs-title i { color: var(--c-primary); }
  .col-funcs-meta { font-size: 11.5px; color: var(--c-text-muted); margin-top: 2px; }
  .col-funcs-actions { display: flex; align-items: center; gap: 6px; }
  .col-funcs-toolbar {
    padding: 10px 18px;
    border-bottom: 1px solid var(--c-border-soft);
    display: flex; align-items: center; gap: 10px;
  }
  .col-funcs-list {
    flex: 1;
    overflow: auto;
    padding: 12px 18px 18px;
  }

  /* Drop indicator */
  .drop-indicator {
    height: 0;
    border-top: 2px solid var(--c-primary);
    margin: 0 8px;
    box-shadow: 0 0 0 2px rgba(30,34,170,0.12);
    border-radius: 1px;
    pointer-events: none;
  }

  /* ===== Misc ===== */
  .global-stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }
  .stat-card {
    background: #fff;
    border: 1px solid var(--c-border);
    border-radius: 10px;
    padding: 12px 14px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .stat-card-num { font-size: 22px; font-weight: 700; color: var(--c-primary); letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
  .stat-card-lbl { font-size: 11.5px; color: var(--c-text-muted); margin-top: 2px; }
  .stat-card-icon {
    width: 32px; height: 32px;
    background: var(--c-primary-50);
    border-radius: 8px;
    display: grid; place-items: center;
    color: var(--c-primary);
  }

  .kbd {
    font-family: "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    font-size: 10.5px;
    background: var(--c-bg-zebra);
    border: 1px solid var(--c-border);
    border-bottom-width: 2px;
    border-radius: 4px;
    padding: 1px 5px;
    color: var(--c-text-muted);
  }

  /* ===== DC artboard chrome adjustments ===== */
  .dc-artboard { background: #ffffff; }
</style>
</head>
